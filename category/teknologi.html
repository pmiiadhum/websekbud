<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Teknologi - Sekolah Kajian Budaya</title>
    <style>
        /* =========================================
           VARIABEL WARNA & RESET (100% Sesuai)
           ========================================= */
        :root {
            --brand-red: #c0172e;
            --text-dark: #2c2520; /* Hitam Kecokelatan */
            --text-gray: #7c7267; /* Abu Tanah */
            --bg-light: #faf8f5;  /* Krem Lembut */
            --border-color: #ebdcd0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: var(--text-dark);
            background-color: var(--bg-light);
            font-family: 'Georgia', serif; 
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* =========================================
           HEADER LOGO (Sesuai Beranda + Kultur)
           ========================================= */
        .main-header {
            text-align: center;
            padding: 20px 10px;
            border-bottom: 1px solid var(--border-color);
            background: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        .logo-link {
            display: inline-block;
        }

        .logo-placeholder {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-placeholder span {
            color: var(--brand-red);
        }

        .logo-tagline {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-top: 5px;
        }

        /* UKURAN LOGO DIUBAH JADI 128PX (SAMA DENGAN KULTUR) */
        .site-logo {
            height: 128px;
            width: auto;
            object-fit: contain;
        }

        /* =========================================
           LAYOUT EDITORIAL (TEMA KREM KULTURAL)
           ========================================= */
        .blog-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            gap: 40px;
            padding: 0 20px;
        }

        /* Kolom Kiri Utama */
        .content-posts {
            flex: 7;
            background: white;
            padding: 35px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
        }

        .culture-heading {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-gray);
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        /* Pembungkus Artikel */
        .editorial-grid {
            display: flex;
            flex-direction: column;
            gap: 45px;
        }

        .magazine-card {
            display: block;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 35px;
        }

        .post-label {
            color: var(--brand-red);
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .post-title {
            font-size: 1.6rem;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .magazine-card:hover .post-title {
            color: var(--brand-red);
        }

        /* Kotak Gambar Artikel */
        .post-cover {
            width: 100%;
            height: 240px;
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            font-style: italic;
            margin-bottom: 15px;
        }

        /* Teks Dua Kolom Koran */
        .post-snippet {
            font-size: 0.95rem;
            color: var(--text-dark);
            column-count: 2;
            column-gap: 20px;
            text-align: justify;
        }

        /* Kolom Kanan (Sidebar Catatan Ruang) */
        .sidebar-panel {
            flex: 3;
        }

        .sidebar-box {
            background: white;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
        }

        .sidebar-box h3 {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-gray);
            margin-bottom: 15px;
            border-left: 3px solid var(--brand-red);
            padding-left: 8px;
        }

        .sidebar-text {
            font-size: 0.85rem;
            color: #5c5247;
            font-style: italic;
            margin-bottom: 20px;
        }

        .back-link-classic {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.8rem;
            color: var(--brand-red);
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px dashed var(--brand-red);
            padding-bottom: 3px;
        }

        /* Responsif HP */
        @media (max-width: 768px) {
            .blog-wrapper {
                flex-direction: column;
            }
            .post-snippet {
                column-count: 1;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="../index.html" class="logo-link">
            <div class="logo-placeholder">
                <img src="../assets/logo.png" alt="Logo Sekolah Kajian Budaya" class="site-logo">
                <span>SEKOLAH</span>KAJIAN BUDAYA
            </div>
        </a>
        <div class="logo-tagline">Pendidikan tidak mengubah dunia. Pendidikan mengubah manusia dan manusialah yang mengubah dunia.</div>
    </header>

    <div class="blog-wrapper">
        
        <main class="content-posts">
            <div class="culture-heading">Kajian: Teknologi</div>
            
            <div class="editorial-grid">

                <article class="magazine-card">
                    <div class="post-label">TEKNOLOGI</div>
                    <h2 class="post-title"> Coming soon</h2>
                    <div class="post-cover">[ Ruang Gambar Artikel ]</div>
                    <p class="post-snippet">
                        Coming soon. 
                    </p>
                </article>

            </div>
        </main>

        <aside class="sidebar-panel">
            <div class="sidebar-box">
                <h3>Catatan Ruang</h3>
                <p class="sidebar-text">
                    teks
                </p>
                <a href="../index.html" class="back-link-classic">« Kembali ke Beranda</a>
            </div>
        </aside>

    </div>

</body>
</html>
